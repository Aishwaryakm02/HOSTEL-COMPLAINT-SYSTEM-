<!DOCTYPE html>
<html>

<head>

    <title>Hostel Complaint System</title>

    <style>

        body{
            font-family: Arial;
            background: #f2f2f2;
            margin: 0;
            padding: 0;
        }

        .container{
            width: 90%;
            max-width: 500px;
            margin: auto;
            margin-top: 40px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h1, h2{
            text-align: center;
        }

        input, textarea, select{

            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid gray;

        }

        button{

            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;

        }

        table{

            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;

        }

        th, td{

            border: 1px solid black;
            padding: 10px;
            text-align: center;

        }

        .hidden{
            display: none;
        }

    </style>

</head>

<body>

<!-- LOGIN PAGE -->

<div class="container" id="loginPage">

    <h1>Hostel Complaint System</h1>

    <p style="text-align:center;">

        Welcome Student 👋 <br>
        We are here to resolve your hostel problems quickly.

    </p>

    <input
        type="text"
        id="studentName"
        placeholder="Enter Your Name"
    >

    <button onclick="startSystem()">
        Enter System
    </button>

</div>


<!-- MAIN PAGE -->

<div class="container hidden" id="mainPage">

    <h2 id="welcomeText"></h2>

    <h3>Submit Complaint</h3>

    <input
        type="text"
        id="title"
        placeholder="Complaint Title"
    >

    <textarea
        id="description"
        placeholder="Description"
    ></textarea>

    <input
        type="text"
        id="location"
        placeholder="Room Number / Location"
    >

    <select id="category">

        <option>Food</option>
        <option>Electrical</option>
        <option>Plumbing</option>
        <option>Cleaning</option>
        <option>Internet</option>

    </select>

    <select id="urgency">

        <option>Yes</option>
        <option>No</option>

    </select>

    <button onclick="submitComplaint()">
        Submit Complaint
    </button>

    <button onclick="logout()">
        Logout
    </button>

</div>


<!-- COMPLAINT TABLE -->

<div class="container hidden" id="tableContainer">

    <h2>My Complaints</h2>

    <table>

        <tr>

            <th>Title</th>
            <th>Category</th>
            <th>Location</th>
            <th>Urgency</th>
            <th>Status</th>
            <th>Action</th>

        </tr>

        <tbody id="tableBody"></tbody>

    </table>

</div>


<script>

    let complaints =
        JSON.parse(localStorage.getItem("complaints")) || [];


    function startSystem(){

        let name =
            document.getElementById("studentName").value;

        if(name == ""){

            alert("Please enter your name");
            return;

        }

        localStorage.setItem("studentName", name);

        document
            .getElementById("loginPage")
            .classList.add("hidden");

        document
            .getElementById("mainPage")
            .classList.remove("hidden");

        document
            .getElementById("tableContainer")
            .classList.remove("hidden");

        document
            .getElementById("welcomeText")
            .innerHTML =
            "Welcome " + name + " 👋";

        displayComplaints();

    }


    // AUTO LOGIN

    window.onload = function(){

        let savedName =
            localStorage.getItem("studentName");

        if(savedName){

            document
                .getElementById("loginPage")
                .classList.add("hidden");

            document
                .getElementById("mainPage")
                .classList.remove("hidden");

            document
                .getElementById("tableContainer")
                .classList.remove("hidden");

            document
                .getElementById("welcomeText")
                .innerHTML =
                "Welcome " + savedName + " 👋";

            displayComplaints();

        }

    }


    function submitComplaint(){

        let title =
            document.getElementById("title").value;

        let description =
            document.getElementById("description").value;

        let location =
            document.getElementById("location").value;

        let category =
            document.getElementById("category").value;

        let urgency =
            document.getElementById("urgency").value;


        // DUPLICATE DETECTION

        for(let c of complaints){

            if(
                c.title.toLowerCase() === title.toLowerCase()
                &&
                c.location.toLowerCase() === location.toLowerCase()
            ){

                alert("Complaint already exists");
                return;

            }

        }


        let complaint = {

            title: title,
            description: description,
            location: location,
            category: category,
            urgency: urgency,
            status: "Pending"

        };


        complaints.push(complaint);


        localStorage.setItem(
            "complaints",
            JSON.stringify(complaints)
        );


        displayComplaints();


        document.getElementById("title").value = "";
        document.getElementById("description").value = "";
        document.getElementById("location").value = "";

    }


    function displayComplaints(){

        let table =
            document.getElementById("tableBody");

        table.innerHTML = "";


        complaints.forEach((c, index) => {

            table.innerHTML += `

            <tr>

                <td>${c.title}</td>
                <td>${c.category}</td>
                <td>${c.location}</td>
                <td>${c.urgency}</td>
                <td>${c.status}</td>

                <td>

                    <button onclick="resolveComplaint(${index})">

                        Resolve

                    </button>

                </td>

            </tr>

            `;

        });

    }


    function resolveComplaint(index){

        complaints[index].status = "Resolved";

        localStorage.setItem(
            "complaints",
            JSON.stringify(complaints)
        );

        displayComplaints();

    }


    function logout(){

        localStorage.removeItem("studentName");

        location.reload();

    }

</script>

</body>
</html>
